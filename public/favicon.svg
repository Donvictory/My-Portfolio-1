<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background pill matching portfolio bg -->
  <rect width="64" height="64" rx="14" fill="#0c0a09"/>
  <!-- Accent glow -->
  <rect width="64" height="64" rx="14" fill="url(#glow)" opacity="0.4"/>
  <!-- "D" lettermark in accent color -->
  <text
    x="50%"
    y="54%"
    dominant-baseline="middle"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="36"
    font-style="italic"
    fill="#e8855a"
    letter-spacing="-1"
  >D</text>
  <!-- Dot accent -->
  <circle cx="44" cy="42" r="4" fill="#e8855a" opacity="0.9"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8855a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0c0a09" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
